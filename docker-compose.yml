services:
  mysql:
    image: mysql:8.4
    container_name: roni5-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: roni5
      MYSQL_USER: roni5
      MYSQL_PASSWORD: roni5
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - roni5-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  roni5-mysql-data:
