name: Deploy

# Deploys on every push to main. Watch runs under the repo's "Actions" tab.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, gd, intl, zip, exif, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies (with dev, for tests)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Run tests (deploy gate)
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan test

      - name: Prune dev dependencies for production
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage' \
            --exclude='public/storage' \
            --exclude='database/database.sqlite' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/srv/roni5/"

      - name: Run remote deploy
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'bash /srv/roni5/deploy/deploy.sh'
